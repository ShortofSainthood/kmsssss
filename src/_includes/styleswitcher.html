<form aria-label="styleswitcher">
    <label style="font-weight: bold; color: var(--textaccent);" for="styleswitcher">Change Theme:</label><br>
    <select id="styleswitcher" name="styleswitcher" onchange="changeStyle(this.value)">
        <option value="automatic">Automatic</option>
        <option value="light">Light</option>
        <option value="dark">Dark</option>
    </select>
</form>
